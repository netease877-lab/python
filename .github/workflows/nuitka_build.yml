name: Compile N6000 OpenVINO Wheels

on:
  workflow_dispatch: 

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space (Critical for massive C++ builds)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3-venv python3-dev patchelf ccache

      - name: Setup ccache (Turbocharge future builds)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-openvino-n6000-${{ github.sha }}
          restore-keys: |
            ubuntu-openvino-n6000-
          max-size: 5G

      - name: Create and activate Python virtualenv for build
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH
          # 核心：加入官方 build 模块，用于强行生成 whl
          ${GITHUB_WORKSPACE}/.venv/bin/python -m pip install --upgrade pip setuptools wheel pybind11 cython pybind11-stubgen==2.5.5 build

      - name: Clone OpenVINO Source
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.git
          
      - name: Build OpenVINO (Force disable AVX2 for N6000)
        run: |
          cd openvino
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
      - name: Clone and Build OpenVINO GenAI
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.genai.git
          cd openvino.genai
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DOpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
          # 必杀技：直接用 Python 官方打包工具深入目录，强行提取 GenAI 的 whl 包
          cd ${GITHUB_WORKSPACE}/openvino.genai
          export OpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build
          ${GITHUB_WORKSPACE}/.venv/bin/python -m build --wheel
          
      - name: Collect and Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          # 终极全量抓取，将 Python 吐在 dist 目录下的包一网打尽
          path: |
            openvino/build/wheels/**/*.whl
            openvino.genai/dist/**/*.whl
            openvino.genai/build/wheels/**/*.whl
          compression-level: 9
