name: Build and Push Phantomz Base Image

on:
  push:
    branches: [ main, master ]   # 当推送到 main 或 master 分支时触发
    paths:
      - 'Dockerfile.base'       # 只有 Dockerfile 变化时才触发（可选）
  workflow_dispatch:            # 允许手动触发

env:
  REGISTRY: docker.io           # Docker Hub
  IMAGE_NAME: phantomz-base     # 镜像名称
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base    # 指定 Dockerfile 路径
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
