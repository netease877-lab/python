name: Compile N6000 OpenVINO Wheels

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3-venv python3-dev patchelf ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-ubuntu-openvino-n6000
          restore-keys: |
            ccache-ubuntu-openvino-
          max-size: 5G

      - name: Create Python venv
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH
          ${GITHUB_WORKSPACE}/.venv/bin/python -m pip install --upgrade pip setuptools wheel build pybind11 cython pybind11-stubgen==2.5.5

      - name: Clone OpenVINO
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.git

      - name: Build OpenVINO (no AVX2)
        run: |
          cd openvino
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          make -j$(nproc)

      - name: Clone OpenVINO GenAI
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.genai.git

      - name: Patch GenAI pyproject (Fix wrong dependency)
        run: |
          cd openvino.genai
          echo "[build-system]" > pyproject.toml
          echo 'requires = ["py-build-cmake", "wheel", "setuptools"]' >> pyproject.toml
          echo 'build-backend = "py_build_cmake.build"' >> pyproject.toml

      - name: Build GenAI
        run: |
          cd openvino.genai
          export OpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build
          ${GITHUB_WORKSPACE}/.venv/bin/python -m build --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          path: |
            openvino/build/wheels/**/*.whl
            openvino.genai/dist/**/*.whl
