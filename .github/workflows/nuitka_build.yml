name: Compile N6000 OpenVINO Wheels

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3-venv python3-dev patchelf ccache ocl-icd-opencl-dev

      - name: Setup ccache (fixed key ensures persistent reuse)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-openvino-n6000
          restore-keys: |
            ccache-openvino-
          max-size: 8G

      - name: Configure ccache environment (VERY IMPORTANT)
        run: |
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=1" >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=time_macros,file_macro,include_file_mtime" >> $GITHUB_ENV
          ccache -p || true
        shell: bash

      - name: Create Python venv
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH
          ${GITHUB_WORKSPACE}/.venv/bin/python -m pip install --upgrade pip setuptools wheel build pybind11 cython pybind11-stubgen==2.5.5 py-build-cmake==0.5.0 "cmake~=3.23.0"

      - name: Clone OpenVINO
        run: git clone --recurse-submodules --depth 1 https://github.com/openvinotoolkit/openvino.git -b releases/2026/0

      - name: Build OpenVINO with working ccache
        run: |
          df -h
          cd openvino
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_FLAGS="-fdebug-prefix-map=${GITHUB_WORKSPACE}=." \
            -DCMAKE_CXX_FLAGS="-fdebug-prefix-map=${GITHUB_WORKSPACE}=." \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          
          ccache -s || true
          make -j$(nproc)
          ccache -s || true
          df -h

      - name: Install Built OpenVINO Core
        run: |
          python -m pip install openvino/build/wheels/*.whl
          # Verify installation and find OpenVINO_DIR
          python -c "import openvino; print(f'OpenVINO version: {openvino.__version__}')"
          # Locate OpenVINOConfig.cmake
          OV_CONFIG_PATH=$(find ${GITHUB_WORKSPACE}/openvino/build -name "OpenVINOConfig.cmake" | head -n 1)
          OV_DIR=$(dirname "$OV_CONFIG_PATH")
          echo "DETECTED_OV_DIR=$OV_DIR" >> $GITHUB_ENV
          echo "Found OpenVINOConfig.cmake at: $OV_CONFIG_PATH"

      - name: Clone OpenVINO GenAI
        run: |
          git clone --depth 1 https://github.com/openvinotoolkit/openvino.genai.git -b releases/2026/0
          cd openvino.genai
          git submodule update --init --recursive --depth 1 --jobs $(nproc)

      - name: Build GenAI wheels (Native Build)
        run: |
          df -h
          cd openvino.genai
          export OpenVINO_DIR=${{ env.DETECTED_OV_DIR }}
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export CMAKE_BUILD_PARALLEL_LEVEL=1
          echo "Using OpenVINO_DIR: $OpenVINO_DIR"
          python -m build --wheel --no-isolation -vv
          df -h

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          path: |
            **/wheels/*.whl
            openvino.genai/dist/*.whl
