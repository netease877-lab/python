name: Compile N6000 OpenVINO Wheels

# 允许在 GitHub 网页上手动点击运行按钮触发
on:
  workflow_dispatch: 

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space (Critical for massive C++ builds)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          
      - name: Install Dependencies (Including User Fix)
        run: |
          sudo apt-get update
          # 完美融合你的修复方案：强力注入 patchelf
          sudo apt-get install -y cmake build-essential git python3-pip python3-dev patchelf
          # 升级 setuptools 和 wheel，修复 bdist_wheel 问题
          sudo python3 -m pip install --upgrade setuptools wheel
      - name: Clone OpenVINO Source
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.git
          
      - name: Build OpenVINO (Force disable AVX2 for N6000)
        run: |
          cd openvino
          mkdir build && cd build
          # 核心魔法：强制关闭 AVX2 和 AVX512F，确保完美兼容 N6000 老架构 CPU
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=/usr/bin/python3 \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
      - name: Clone and Build OpenVINO GenAI
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.genai.git
          cd openvino.genai
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=/usr/bin/python3 \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
      - name: Collect and Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          # 使用通配符精准抓取编译出来的 Python 安装包
          path: |
            openvino/build/**/*.whl
            openvino.genai/build/**/*.whl
          compression-level: 9
