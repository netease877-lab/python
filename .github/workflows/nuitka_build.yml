name: Compile N6000 OpenVINO Wheels

# 允许在 GitHub 网页上手动点击运行按钮触发
on:
  workflow_dispatch: 

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space (Critical for massive C++ builds)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          
      - name: Install Dependencies (keep system deps, avoid sudo pip upgrades)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3-venv python3-dev patchelf

      - name: Create and activate Python virtualenv for build
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH
          # 使用 venv 中的 python 明确升级 pip/setuptools/wheel（不会触碰系统包）
          ${GITHUB_WORKSPACE}/.venv/bin/python -m pip install --upgrade pip setuptools wheel

      - name: Clone OpenVINO Source
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.git
          
      - name: Build OpenVINO (Force disable AVX2 for N6000)
        run: |
          cd openvino
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
      - name: Clone and Build OpenVINO GenAI
        run: |
          git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.genai.git
          cd openvino.genai
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          make -j$(nproc)
          
      - name: Collect and Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          path: |
            openvino/build/**/*.whl
            openvino.genai/build/**/*.whl
          compression-level: 9
