name: Compile N6000 OpenVINO Wheels

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3-venv python3-dev patchelf ccache ocl-icd-opencl-dev

      - name: Setup ccache (fixed key ensures persistent reuse)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-openvino-n6000
          restore-keys: |
            ccache-openvino-
          max-size: 8G

      - name: Configure ccache environment (VERY IMPORTANT)
        run: |
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=1" >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=time_macros,file_macro,include_file_mtime" >> $GITHUB_ENV
          ccache -p || true
        shell: bash

      - name: Create Python venv
        run: |
          python3 -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> $GITHUB_PATH
          ${GITHUB_WORKSPACE}/.venv/bin/python -m pip install --upgrade pip setuptools wheel build pybind11 cython pybind11-stubgen==2.5.5 py-build-cmake==0.5.0

      - name: Clone OpenVINO
        run: git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.git -b releases/2026/0

      - name: Build OpenVINO with working ccache
        run: |
          cd openvino
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_FLAGS="-fdebug-prefix-map=${GITHUB_WORKSPACE}=." \
            -DCMAKE_CXX_FLAGS="-fdebug-prefix-map=${GITHUB_WORKSPACE}=." \
            -DENABLE_AVX2=OFF \
            -DENABLE_AVX512F=OFF \
            -DENABLE_PYTHON=ON \
            -DPYTHON_EXECUTABLE=${GITHUB_WORKSPACE}/.venv/bin/python \
            -DENABLE_WHEEL=ON
          
          ccache -s || true
          make -j$(nproc)
          ccache -s || true

      - name: Install Built OpenVINO Core
        run: |
          python -m pip install openvino/build/wheels/*.whl

      - name: Clone OpenVINO GenAI
        run: git clone --recurse-submodules https://github.com/openvinotoolkit/openvino.genai.git -b releases/2026/0

      - name: Build GenAI wheels (Native Build)
        run: |
          cd openvino.genai
          export OpenVINO_DIR=${GITHUB_WORKSPACE}/openvino/build
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          python -m build --wheel --no-isolation

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: n6000_openvino_wheels
          path: |
            **/*.whl
